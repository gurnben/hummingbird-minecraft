name: Build and Push Container

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-push.yaml
      - Containerfile
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/build-push.yaml
      - Containerfile
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Lint Containerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Containerfile
          failure-threshold: error

  build:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Get Minecraft version from Containerfile
        id: mc-version
        run: echo "version=$(grep -oP 'ARG MINECRAFT_VERSION="\K[^"]+' Containerfile)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=${{ steps.mc-version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Cache Docker layers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Containerfile') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ hashFiles('Containerfile') }}-

      - name: Get current date
        id: get-date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Containerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event_name == 'schedule' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: MINECRAFT_VERSION=${{ steps.mc-version.outputs.version }},BUILD_DATE=${{ steps.get-date.outputs.date }}

  verify:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Get Minecraft version from Containerfile
        id: mc-version
        run: echo "version=$(grep -oP 'ARG MINECRAFT_VERSION="\K[^"]+' Containerfile)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Get current date
        id: get-date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Containerfile
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:verify
          build-args: MINECRAFT_VERSION=${{ steps.mc-version.outputs.version }},BUILD_DATE=${{ steps.get-date.outputs.date }}

      - name: Run container and capture output
        id: run
        run: |
          timeout 60 docker run --rm --name mc-verify ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:verify 2>&1 | tee /tmp/minecraft-output.txt || true

      - name: Verify Minecraft server starts with EULA notice
        id: verify-eula
        run: grep -q 'You need to agree to the EULA in order to run the server' /tmp/minecraft-output.txt

      - name: Handle verify failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: failure()
        run: |
          LATEST_VERSION_NUM="${{ steps.mc-version.outputs.version }}"
          TITLE="Verify step failed for Minecraft version $LATEST_VERSION_NUM on ${{ github.workflow }} (${{ github.job }})"
          
          printf '%s\n' \
            "The **verify** step failed in ${{ github.workflow }}." \
            "" \
            "### Job Details" \
            "- **Commit**: ${{ github.sha }}" \
            "- **Run URL**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "- **Triggered by**: ${{ github.event_name }}" \
            "" \
            "The EULA notice was not found in the container output." \
            "Please investigate and ensure the Minecraft server still outputs the expected EULA notice." \
            > /tmp/issue-body.md
          
          # Check if an open issue for this version already exists (like update-minecraft.yaml PR check)
          open_issues=$(gh issue list --state open --label verify-failure --json number,title 2>/dev/null || true)
          
          EXISTING=$(echo "$open_issues" | jq --arg ver "$LATEST_VERSION_NUM" -r '[.[] | select(.title | contains($ver))] | first | .number // empty' 2>/dev/null || true)
          
          if [ -n "$EXISTING" ]; then
            echo "Commenting on existing issue #$EXISTING"
            gh issue comment "$EXISTING" --body-file /tmp/issue-body.md
          else
            echo "Creating new issue"
            gh issue create \
              --title "$TITLE" \
              --body-file /tmp/issue-body.md \
              --label verify-failure
          fi

  push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build, verify]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Cache Docker layers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Containerfile') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ hashFiles('Containerfile') }}-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Minecraft version from Containerfile
        id: mc-version
        run: echo "version=$(grep -oP 'ARG MINECRAFT_VERSION="\K[^"]+' Containerfile)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=raw,value=${{ steps.mc-version.outputs.version }}

      - name: Get current date
        id: get-date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Push container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Containerfile
          push: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event_name == 'schedule' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: MINECRAFT_VERSION=${{ steps.mc-version.outputs.version }},BUILD_DATE=${{ steps.get-date.outputs.date }}
