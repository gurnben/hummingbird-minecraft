name: Update Minecraft Server

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-minecraft:
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get latest Minecraft server version
        id: version
        run: |
          LATEST_VERSION=$(curl -s https://launchermeta.mojang.com/mc/game/version_manifest.json | jq -r '.latest.release')
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "Found latest Minecraft server version: $LATEST_VERSION"

      - name: Get latest server.jar download URLs
        id: urls
        run: |
          LATEST_URL=$(curl -s "https://launchermeta.mojang.com/mc/game/version/${{ steps.version.outputs.latest_version }}" | jq -r '.downloads.server.url')
          echo "latest_url=$LATEST_URL" >> "$GITHUB_OUTPUT"

      - name: Check if update is needed
        id: check
        run: |
          CURRENT_VERSION=$(grep -oP 'MINECRAFT_VERSION:\s*"\K[0-9.]+' .github/workflows/build-push.yaml | head -1)
          LATEST_VERSION="${{ steps.version.outputs.latest_version }}"
          if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
            echo "No update needed. Current version $CURRENT_VERSION is already the latest."
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get octo-sts token
        id: octo-sts
        if: steps.check.outputs.update_needed == 'true'
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: ${{ github.repository }}
          identity: minecraft-update

      - name: Update and create PR
        if: steps.check.outputs.update_needed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          LATEST_VERSION="${{ steps.version.outputs.latest_version }}"
          LATEST_URL="${{ steps.urls.outputs.latest_url }}"

          git config user.name "minecraft-update[bot]"
          git config user.email "minecraft-update[bot]@users.noreply.github.com"

          BRANCH="update/minecraft-server-${LATEST_VERSION}"
          git checkout -b "$BRANCH"

          CURRENT_VERSION=$(grep -oP 'MINECRAFT_VERSION:\s*"\K[0-9.]+' .github/workflows/build-push.yaml | head -1)

          sed -i "s|MINECRAFT_VERSION: \".*\"|MINECRAFT_VERSION: \"${LATEST_VERSION}\"|" .github/workflows/build-push.yaml
          sed -i "s|https://piston-data.mojang.com/v1/objects/[^/]*/server.jar|${{ steps.urls.outputs.latest_url }}|" Containerfile

          git add .github/workflows/build-push.yaml Containerfile
          git commit -m "chore: update Minecraft server to ${LATEST_VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: update Minecraft server to ${LATEST_VERSION}" \
            --body "Automated update of the Minecraft server version. Version: ${LATEST_VERSION}. Download URL: ${LATEST_URL}" \
            --label automated || true
