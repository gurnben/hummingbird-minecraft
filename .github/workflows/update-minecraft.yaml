name: Update Minecraft Server

on:
  schedule:
    # Runs every 10 minutes, between 15:00 and 18:59 UTC, only on Tuesday and Wednesday
    - cron: '*/10 15-18 * * 2,3'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-minecraft:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Get latest Minecraft server version
        id: version
        run: |
          VERSION_MANIFEST=$(curl -fsSL "https://launchermeta.mojang.com/mc/game/version_manifest.json")
          LATEST_VERSION=$(echo "$VERSION_MANIFEST" | jq -r '.latest.release')
          MANIFEST_URL=$(echo "$VERSION_MANIFEST" | jq -r --arg ver "$LATEST_VERSION" '.versions[] | select(.id == $ver) | .url')
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "manifest_url=$MANIFEST_URL" >> "$GITHUB_OUTPUT"
          echo "Found latest Minecraft server version: $LATEST_VERSION"

      - name: Check if update is needed
        id: check
        run: |
          CURRENT_VERSION=$(grep -oP 'ARG MINECRAFT_VERSION="\K[^"]+' Containerfile | head -1)
          LATEST_VERSION="${{ steps.version.outputs.latest_version }}"
          if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
            echo "No update needed. Current version $CURRENT_VERSION is already the latest."
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get octo-sts token
        id: octo-sts
        if: steps.check.outputs.update_needed == 'true'
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: ${{ github.repository }}
          identity: minecraft-update

      - name: Update and create PR
        if: steps.check.outputs.update_needed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          LATEST_VERSION="${{ steps.version.outputs.latest_version }}"
          VERSION_MANIFEST=$(curl -fsSL "${{ steps.version.outputs.manifest_url }}")
          LATEST_URL=$(echo "$VERSION_MANIFEST" | jq -r '.downloads.server.url')
          TITLE="chore: update Minecraft version to ${LATEST_VERSION}"

          # Check if an open PR for this version already exists
          LATEST_VERSION_NUM="${LATEST_VERSION%%+*}"

          open_prs=$(gh pr list --state open --json number,title,headRefName)

          EXISTING=$(echo "$open_prs" | jq --arg ver "$LATEST_VERSION_NUM" --arg branch "update/minecraft-server-$LATEST_VERSION_NUM" -r '[.[] | select((.title | contains($ver)) and (.headRefName == $branch))] | first | .number // empty' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for version $LATEST_VERSION_NUM"
            exit 0
          fi

          git config user.name "minecraft-update[bot]"
          git config user.email "minecraft-update[bot]@users.noreply.github.com"

          BRANCH="update/minecraft-server-${LATEST_VERSION_NUM}"
          git checkout -b "$BRANCH"

          CURRENT_VERSION=$(grep -oP 'ARG MINECRAFT_VERSION="\K[^"]+' Containerfile | head -1)

          sed -i "s|ARG MINECRAFT_VERSION=\".*\"|ARG MINECRAFT_VERSION=\"${LATEST_VERSION_NUM}\"|g" Containerfile
          sed -i "s|https://piston-data.mojang.com/v1/objects/[^/]*/server.jar|${LATEST_URL}|" Containerfile

          git add Containerfile
          git commit -m "chore: update Minecraft server to ${LATEST_VERSION_NUM}"
          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "Automated update of the Minecraft server version. Version: ${LATEST_VERSION_NUM}. Download URL: ${LATEST_URL}" \
            --label mc-update \
